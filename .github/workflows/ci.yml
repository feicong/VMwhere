name: Build

on:
  workflow_dispatch:
    inputs:
      upload:
        description: Upload artifacts to latest release
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            runs_on: ubuntu-24.04
          - label: macos
            runs_on: macos-15
          - label: windows
            runs_on: windows-2025

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang llvm llvm-dev build-essential

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm --yes --no-progress
          # Create a junction without spaces to work around MSYS2/Git Bash argument
          # quoting issues when passing paths containing spaces to native Windows programs.
          if (-not (Test-Path "C:\LLVM")) {
            New-Item -ItemType Junction -Path "C:\LLVM" -Target "C:\Program Files\LLVM"
          }
          Add-Content -Path $env:GITHUB_PATH -Value "C:\LLVM\bin"

          # The Chocolatey LLVM package ships only binaries; the LLVM C++ API
          # development headers (e.g. llvm/IR/PassManager.h) are not included in
          # the Windows installer.  Fetch them with a minimal sparse clone so we
          # don't have to download the full ~400 MB release tarball.
          if (-not (Test-Path "C:\Program Files\LLVM\include\llvm\IR\PassManager.h")) {
            Write-Host "LLVM C++ API headers not found – fetching from source..."
            $rawVer  = & "C:\Program Files\LLVM\bin\clang.exe" --version 2>&1
            $llvmVer = ([regex]'(\d+\.\d+\.\d+)').Match($rawVer).Groups[1].Value
            Write-Host "Detected LLVM version: $llvmVer"
            git clone --depth=1 --filter=blob:none --sparse `
              --branch "llvmorg-${llvmVer}" `
              https://github.com/llvm/llvm-project.git `
              "$env:TEMP\llvm-src"
            Push-Location "$env:TEMP\llvm-src"
            git sparse-checkout set llvm/include
            Pop-Location
            Copy-Item -Recurse -Force "$env:TEMP\llvm-src\llvm\include\*" `
              "C:\Program Files\LLVM\include\"
            Write-Host "LLVM C++ API headers installed."
          }

          Add-Content -Path $env:GITHUB_ENV  -Value "LLVM_INC=C:/LLVM/include"

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          make all

      - name: Build passes (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          # macOS: build LLVM passes only (hooks/static binaries require Linux-specific features)
          make passes

      - name: Build passes (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          # Windows: build LLVM passes as DLLs.
          # LLVM_INC is set by the install step to a space-free path (C:/LLVM/include).
          mkdir -p passes
          shopt -s nullglob
          srcs=(src/passes/*.cpp)
          if [ ${#srcs[@]} -eq 0 ]; then
            echo "No pass source files found in src/passes/" >&2
            exit 1
          fi
          for f in "${srcs[@]}"; do
            name=$(basename "$f" .cpp)
            clang++ -shared -O2 "-I${LLVM_INC}" -L"C:/LLVM/lib" -lLLVM "$f" -o "passes/${name}.dll"
          done

      - name: Package artifacts (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          tar -cJf VMwhere-linux-x86_64.tar.xz passes/ hooks/ build/

      - name: Package artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          tar -cJf "VMwhere-macos-$(uname -m).tar.xz" passes/

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path passes -DestinationPath VMwhere-windows-x86_64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-build
          path: VMwhere-*.*
          if-no-files-found: error

  publish:
    name: Publish to latest release
    if: ${{ inputs.upload == true }}
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Update latest tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${{ github.sha }}"
          git push origin refs/tags/latest --force

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automated build from commit `${{ github.sha }}` on branch `${{ github.ref_name }}`.

            ### Artifacts
            | File | Platform | Contents |
            |------|----------|----------|
            | `VMwhere-linux-x86_64.tar.xz` | Linux x86_64 | LLVM passes (.so), hooks (.o), binaries |
            | `VMwhere-macos-*.tar.xz` | macOS (x86_64/arm64) | LLVM passes (.so) |
            | `VMwhere-windows-x86_64.zip` | Windows x86_64 | LLVM passes (.dll) |

            ### Usage
            See [README.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md) for build and usage instructions.
          files: release-assets/*
          prerelease: true
          make_latest: true
